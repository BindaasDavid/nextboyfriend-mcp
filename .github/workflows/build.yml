name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt into Node 24 for JS-based actions before the runner default flips (see GitHub changelog).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck / build
        run: npm run build
